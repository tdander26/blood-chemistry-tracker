/* ── auth (GIS) ───────────────────────────────────────────────────────── */
function initAuth() {
  if (!window.google || !google.accounts || !google.accounts.oauth2) {
    return setTimeout(initAuth, 200); // GIS script still loading
  }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CONFIG.GOOGLE_CLIENT_ID,
    scope: CONFIG.SCOPES,
    callback: (resp) => {
      if (resp.error) { log('Auth failed: ' + resp.error, 'err'); return; }
      accessToken = resp.access_token;
      log('Connected.', 'ok');
      fetchEmail().then(() => { $('folderBtn').disabled = false; refreshUI(); });
    },
  });
  refreshUI();
}

// Re-request a token each session (no client-side refresh tokens by design).
function ensureToken() {
  return new Promise((resolve, reject) => {
    if (accessToken) return resolve(accessToken);
    if (!tokenClient) return reject(new Error('Auth not ready'));
    const prevCb = tokenClient.callback;
    tokenClient.callback = (resp) => {
      tokenClient.callback = prevCb;
      if (resp.error) return reject(new Error(resp.error));
      accessToken = resp.access_token;
      resolve(accessToken);
    };
    tokenClient.requestAccessToken({ prompt: '' });
  });
}

async function fetchEmail() {
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: 'Bearer ' + accessToken },

    .setIncludeFolders(true)
    .setMimeTypes('application/vnd.google-apps.folder');

    .setOAuthToken(accessToken)
    .setDeveloperKey(CONFIG.GOOGLE_API_KEY)
    .addView(view)

      if (data.action === google.picker.Action.PICKED) {
        const doc = data.docs[0];
        LS.folder = { id: doc.id, name: doc.name };

// Fallback when no folder is chosen: find/create "Blood Chemistry Reports".
async function getOrCreateReportsFolder() {
  const token = await ensureToken();
  const q = encodeURIComponent(
    "name='" + CONFIG.REPORTS_FOLDER_NAME + "' and mimeType='application/vnd.google-apps.folder' and trashed=false"
  );
  const list = await fetch('https://www.googleapis.com/drive/v3/files?q=' + q + '&fields=files(id,name)', {
    headers: { Authorization: 'Bearer ' + token },
  }).then(r => r.json());
  if (list.files && list.files.length) return list.files[0];
  const created = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: CONFIG.REPORTS_FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' }),
  }).then(r => r.json());
  return created;
}

/* ── pdf-service calls (Phase 1 routes) ───────────────────────────────── */
async function exportSheetPdf(spreadsheetId, gid, filename) {
  const token = await ensureToken();
  const r = await fetch(CONFIG.PDF_SERVICE_URL + '/export-sheet', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + CONFIG.PDF_SERVICE_TOKEN, 'Content-Type': 'application/json' },
    body: JSON.stringify({ spreadsheetId, gid, googleAccessToken: token, filename }),
  });
  if (!r.ok) throw new Error('export-sheet ' + r.status + ': ' + (await r.text()).slice(0, 200));
  return await r.blob(); // application/pdf
}
async function renderReportPdf(html, footerLabel) {
  const r = await fetch(CONFIG.PDF_SERVICE_URL + '/render', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + CONFIG.PDF_SERVICE_TOKEN, 'Content-Type': 'application/json' },
    body: JSON.stringify({ html, footerLabel }),
  });
  if (!r.ok) throw new Error('render ' + r.status + ': ' + (await r.text()).slice(0, 200));
  return await r.blob();
}

/* ── Drive upload (into the practitioner's own Drive) ─────────────────── */
async function uploadToDrive(blob, name, folderId) {
  const token = await ensureToken();
  const meta = { name, mimeType: 'application/pdf' };
  if (folderId) meta.parents = [folderId];
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
  form.append('file', blob);
  const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + token },
    body: form,
  });
  if (!r.ok) throw new Error('upload ' + r.status + ': ' + (await r.text()).slice(0, 200));
  return await r.json(); // { id, webViewLink }
}

// PORTED from index.html (position-aware PDF.js extraction). Pure: no DOM side
// effects. Returns { patient, results, updates:[{cell,value}], numPages }.
async function parsePdf(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

  const allItems = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    const viewport = page.getViewport({ scale: 1 });
    content.items.forEach(item => {
      const x = item.transform[4];
      const y = viewport.height - item.transform[5]; // flip y
      const text = item.str.trim();
      if (text) allItems.push({ x, y, text, page: p });
    });
  }
  if (!allItems.length) throw new Error('No text found in PDF');

  // Group items into rows (similar y within 3px, same page).
  allItems.sort((a, b) => (a.page - b.page) * 10000 + (a.y - b.y) || a.x - b.x);
  const rows = [];
  let currentRow = [allItems[0]];
  for (let i = 1; i < allItems.length; i++) {
    const item = allItems[i], prev = currentRow[currentRow.length - 1];
    if (item.page === prev.page && Math.abs(item.y - prev.y) < 3) currentRow.push(item);
    else { rows.push(currentRow); currentRow = [item]; }
  }
  rows.push(currentRow);

  const patient = { name: '', date: '', age: '', sex: '', dob: '' };
  const results = {};
  for (const row of rows) {
    row.sort((a, b) => a.x - b.x);
    const fullText = row.map(r => r.text).join(' ');

    if (!patient.name && row.length > 0) {
      for (const item of row) {
        const nameMatch = item.text.match(/^([A-Z][a-zA-Z]{2,}(?:-[A-Z][a-zA-Z]+)?,\s*[A-Z][a-zA-Z]{2,}(?:\s+[A-Z]\.?)?)$/);
        if (nameMatch && !TEST_MAP[nameMatch[1]] && !fullText.includes('Physician') && !fullText.includes('©')) {
          patient.name = nameMatch[1].trim().replace(/\b\w+/g, w => w.charAt(0) + w.slice(1).toLowerCase());
          break;
        }
      }
    }
    if (fullText.includes('Date Collected:')) { const m = fullText.match(/Date Collected:\s*([0-9/]+)/); if (m) patient.date = m[1]; }
    if (fullText.includes('Age:'))            { const m = fullText.match(/Age:\s*(\d+)/);              if (m) patient.age = m[1]; }
    if (fullText.includes('Sex:'))            { const m = fullText.match(/Sex:\s*(Male|Female|M|F)/i); if (m) patient.sex = m[1].charAt(0).toUpperCase(); }

    if (row.length >= 2) {
      const leftItems = row.filter(r => r.x < 180);
      const valueItems = row.filter(r => r.x >= 180 && r.x < 350);
      if (leftItems.length > 0 && valueItems.length > 0) {
        let testName = leftItems.map(r => r.text).join(' ');
        const rawValue = valueItems[0].text;
        testName = testName.replace(/\s+\d{2}$/, '').trim();
        if (testName === 'Test' || testName.includes('Current Result') || testName.includes('Previous Result') ||
            testName.includes('Date') || testName.includes('Patient') || testName.includes('Specimen') ||
            testName.includes('Account') || testName.includes('Ordering') || testName.includes('©') ||
            testName.includes('Page') || testName.includes('DOB') || testName.includes('Fasting') ||
            testName.includes('Ordered Items') || testName.includes('Clinical') || testName.includes('General Comments')) continue;
        const mapping = TEST_MAP[testName];
        const isNumericValue = rawValue.match(/^[<>]?[\d.]+$/);
        const isTextValue = TEXT_VALUE_TESTS.has(testName) && rawValue.match(/^[A-Za-z][A-Za-z\s\-\/\.]*$/);
        if (mapping && (isNumericValue || isTextValue)) {
          results[testName] = { value: rawValue, row: mapping.row, section: mapping.section, cell: 'D' + mapping.row };
        }
      }
    }
  }

  // DOB — post-loop full-text scan (rows can split "DOB:" from the date).
  const allText = rows.map(r => r.map(i => i.text).join(' ')).join('  ');
  const dobPatterns = [
    /\bDOB\b[:\s]+([0-9]{1,2}[\/\-][0-9]{1,2}[\/\-][0-9]{2,4})/i,
    /Date\s+of\s+Birth[:\s]+([0-9]{1,2}[\/\-][0-9]{1,2}[\/\-][0-9]{2,4})/i,
    /\bDOB\b[:\s]+([0-9]{4}[\/\-][0-9]{1,2}[\/\-][0-9]{1,2})/i, // ISO
  ];
  for (const pat of dobPatterns) {
    const m = allText.match(pat);
    if (m) {
      const parts = m[1].split(/[\/\-]/);
      let yyyy, mm, dd;
      if (parts[0].length === 4) { yyyy = parts[0]; mm = parts[1].padStart(2, '0'); dd = parts[2].padStart(2, '0'); }
      else { mm = parts[0].padStart(2, '0'); dd = parts[1].padStart(2, '0'); yyyy = parts[2]; if (yyyy.length === 2) yyyy = (parseInt(yyyy, 10) > 30 ? '19' : '20') + yyyy; }
      patient.dob = yyyy + '-' + mm + '-' + dd;
      break;
    }
  }

  // Cell updates the sheet needs (mirrors the old pushViaAppsScript payload).
  const updates = [];
  if (patient.name) updates.push({ cell: 'B2', value: patient.name });
  if (patient.date) updates.push({ cell: 'B3', value: patient.date });
  if (patient.age)  updates.push({ cell: 'E2', value: patient.age });
  if (patient.sex)  updates.push({ cell: 'I2', value: patient.sex });
  for (const [, data] of Object.entries(results)) updates.push({ cell: 'D' + data.row, value: data.value });

  return { patient, results, updates, numPages: pdf.numPages };
}

/* ── orchestration ────────────────────────────────────────────────────── */
async function run() {
  try {
    $('goBtn').disabled = true;
    await ensureToken();
    const folder = LS.folder || await getOrCreateReportsFolder();
    log('Saving into: ' + (folder.name || folder.id));

    const parsed = parsedData || await parsePdf(pickedFile);
    log('Using ' + parsed.updates.length + ' extracted values'
        + (parsed.patient.name ? ' for ' + parsed.patient.name : ''));

    log('Building sheet…');
    const sheetName = ((parsed.patient.name || 'Patient') + ' ' + (parsed.patient.date || '')).trim().slice(0, 100);
    const { spreadsheetId, gid } = await createPopulatedSheet(parsed, sheetName); // STUB

    log('Exporting styled sheet PDF…');
    const sheetPdf = await exportSheetPdf(spreadsheetId, gid, 'Blood Chemistry');
    await uploadToDrive(sheetPdf, 'Blood Chemistry.pdf', folder.id);

    log('Rendering Functional Report…');
    const reportHtml = buildReportHtml(parsed);
    const reportPdf = await renderReportPdf(reportHtml, parsed.patient && parsed.patient.name);
    await uploadToDrive(reportPdf, 'Functional Analysis Report.pdf', folder.id);

    await updateTrends(parsed, folder.id);                    // STUB
    log('Done — saved to your Drive.', 'ok');
  } catch (e) {
    log(e.message, 'err');
  } finally {
    $('goBtn').disabled = false;
  }
}

/* ── UI wiring ────────────────────────────────────────────────────────── */
function refreshUI() {
  const email = LS.email;
  $('acctPill').textContent = email ? ('Connected as ' + email) : 'Not connected';
  $('acctPill').className = 'pill' + (email ? ' on' : '');
  const f = LS.folder;
  $('folderPill').textContent = 'Saving to: ' + (f ? f.name : '(app folder)');
  $('goBtn').disabled = !(accessToken && pickedFile);
}

function wire() {
  if (!configReady()) {
    const w = $('configWarn');
    w.style.display = 'block';
    w.textContent = 'Fill in CONFIG (client id / API key / pdf-service URL + token) at the top of the script before this will connect.';
  }
  $('connectBtn').onclick = () => {
    if (!tokenClient) { log('Auth not ready yet.', 'err'); return; }
    tokenClient.requestAccessToken({ prompt: 'consent' });
  };
  $('folderBtn').onclick = chooseFolder;
  $('goBtn').onclick = run;
  $('drop').onclick = () => $('file').click();
  $('file').onchange = (e) => setFile(e.target.files[0]);
  $('drop').ondragover = (e) => { e.preventDefault(); $('drop').classList.add('has'); };
  $('drop').ondragleave = () => $('drop').classList.remove('has');
  $('drop').ondrop = (e) => { e.preventDefault(); setFile(e.dataTransfer.files[0]); };
  if (window.pdfjsLib) {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  initAuth();
  loadPicker();
  loadApexConfig();
  refreshUI();
}
async function setFile(file) {
  if (!file) return;
  pickedFile = file;
  parsedData = null;
  $('drop').classList.add('has');
  $('drop').textContent = file.name;
  refreshUI();
  // Preview the extraction right away — works with NO Google connection, so it
  // proves parsePdf() on its own.
  try {
    log('Parsing ' + file.name + '…');
    parsedData = await parsePdf(file);
    const p = parsedData.patient;
    log('Parsed ' + parsedData.updates.length + ' values'
        + (p.name ? ' · ' + p.name : '')
        + (p.dob ? ' · DOB ' + p.dob : '')
        + ' · ' + parsedData.numPages + ' pages', 'ok');
  } catch (e) {
    log('Parse failed: ' + e.message, 'err');
  }
  refreshUI();
}

window.addEventListener('DOMContentLoaded', wire);
